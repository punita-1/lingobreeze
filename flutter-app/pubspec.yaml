name: lingobreeze
description: LingoBreeze - Save vocabulary words you want to learn

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  # State Management
  provider: ^6.1.1
  # HTTP
  http: ^1.1.0
  # UUID
  uuid: ^4.2.1
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
